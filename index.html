<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Audio Tagger</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0f0f17;
  --s1:     #1a1a2e;
  --s2:     #232338;
  --border: #2e2e4a;
  --text:   #e8e8f0;
  --muted:  #8888aa;
  --blue:   #4a9eff;
  --green:  #3ecf8e;
  --purple: #a78bfa;
  --amber:  #fbbf24;
  --red:    #f87171;
  --r:      10px;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px 60px; }
.app { max-width: 900px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 2px; }
.sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

/* Config row */
.cfg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; margin-bottom: 12px; }
label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
input[type=text], input[type=password] { width: 100%; padding: 8px 11px; background: var(--s2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 13px; outline: none; transition: border-color .15s; }
input:focus { border-color: var(--blue); }

/* Tabs */
.tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.tab { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all .15s; }
.tab.active { background: rgba(74,158,255,.15); border-color: var(--blue); color: var(--blue); }

/* Drop zone */
.drop { border: 1.5px dashed var(--border); border-radius: var(--r); padding: 28px 20px; text-align: center; cursor: pointer; transition: all .15s; background: var(--s1); }
.drop:hover, .drop.over { border-color: var(--green); background: rgba(62,207,142,.04); }
.drop input { display: none; }
.drop-icon { width: 32px; height: 32px; margin: 0 auto 8px; border-radius: 50%; background: rgba(62,207,142,.12); display: flex; align-items: center; justify-content: center; }
.drop-icon svg { width: 16px; height: 16px; stroke: var(--green); fill: none; stroke-width: 2; }
.drop-title { font-size: 14px; font-weight: 500; }
.drop-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* Buttons */
button { padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--s2); color: var(--text); transition: all .15s; }
button:hover { border-color: var(--blue); color: var(--blue); }
button.primary { background: rgba(74,158,255,.15); border-color: var(--blue); color: var(--blue); }
button.primary:hover { background: rgba(74,158,255,.28); }
button:disabled { opacity: .4; cursor: not-allowed; }
.btn-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }

/* Progress */
.prog-wrap { height: 4px; background: var(--border); border-radius: 4px; margin: 10px 0 4px; display: none; }
.prog-bar  { height: 4px; background: var(--blue); border-radius: 4px; transition: width .3s; width: 0; }
.prog-lbl  { font-size: 11px; color: var(--muted); min-height: 16px; }

/* Results */
#results { margin-top: 20px; }
.result-card { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; }
.result-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.result-filename { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.result-status { font-size: 11px; }
.result-status.ok  { color: var(--green); }
.result-status.err { color: var(--red); }
.result-body { padding: 12px 14px; }

/* Fields grid */
.fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px; margin-bottom: 10px; }
.field { background: var(--s2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px; position: relative; }
.field:hover { border-color: rgba(74,158,255,.4); }
.field-label { font-size: 9px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; }
.field-value { font-size: 11px; font-weight: 500; word-break: break-word; line-height: 1.4; }
.field-value.auto   { color: var(--blue); }
.field-value.ai     { color: var(--green); }
.field-value.world  { color: var(--purple); }
.field-value.empty  { color: var(--muted); font-style: italic; }
.field-copy { position: absolute; top: 5px; right: 6px; opacity: 0; cursor: pointer; background: none; border: none; padding: 2px; border-radius: 3px; transition: opacity .15s; }
.field:hover .field-copy { opacity: 1; }
.field-copy svg { width: 11px; height: 11px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.field-copy:hover svg { stroke: var(--green); }

/* Caption */
.caption-box { background: var(--s2); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; font-size: 11px; color: var(--green); font-weight: 500; line-height: 1.6; font-family: "SF Mono", monospace; word-break: break-word; margin-bottom: 10px; }

/* Copy row button */
.copy-row-btn { width: 100%; padding: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 7px; border: 1px solid var(--border); background: var(--s2); color: var(--muted); transition: all .15s; text-align: center; }
.copy-row-btn:hover { border-color: var(--green); color: var(--green); background: rgba(62,207,142,.08); }
.copy-row-btn.copied { border-color: var(--green); color: var(--green); background: rgba(62,207,142,.12); }

/* Copy all button */
#copyAllBtn { display: none; }

/* Spinner */
.spinner { width: 12px; height: 12px; border: 2px solid rgba(74,158,255,.3); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.status { font-size: 12px; color: var(--muted); }
.status.err { color: var(--red); }
</style>
</head>
<body>
<div class="app">

<h1>Game Audio Tagger</h1>
<p class="sub">Drop multiple files → all tagged at once → copy any row into your sheet</p>

<!-- Config -->
<div class="cfg">
  <div>
    <label>Anthropic API key</label>
    <div style="display:flex;gap:6px">
      <input type="password" id="apiKey" placeholder="sk-ant-...">
      <button onclick="toggleKey()" id="toggleBtn" style="flex-shrink:0;padding:8px 10px">Show</button>
    </div>
  </div>
  <div>
    <label>World character</label>
    <input type="text" id="worldChar" value="dark gothic fantasy">
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="setTab('sfx',this)">SFX</button>
  <button class="tab" onclick="setTab('music',this)">Music</button>
  <button class="tab" onclick="setTab('ui',this)">UI Sound</button>
</div>

<!-- Drop zone -->
<div class="drop" id="drop"
     onclick="document.getElementById('fin').click()"
     ondragover="ev(event);this.classList.add('over')"
     ondragleave="this.classList.remove('over')"
     ondrop="onDrop(event)">
  <input type="file" id="fin" accept="audio/*,.ogg,.wav,.mp3,.flac,.aiff" multiple
         onchange="addFiles(this.files)">
  <div class="drop-icon">
    <svg viewBox="0 0 24 24"><path d="M9 19V6l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg>
  </div>
  <div class="drop-title">Drop audio files here — select multiple</div>
  <div class="drop-sub">WAV · OGG · MP3 · FLAC</div>
</div>

<div class="btn-row">
  <button class="primary" id="runBtn" onclick="runAll()" disabled>Tag all files</button>
  <button onclick="clearAll()" id="clearBtn" style="display:none">Clear</button>
  <button id="copyAllBtn" onclick="copyAll()">Copy all rows</button>
  <span class="status" id="statusMsg"></span>
</div>

<div class="prog-wrap" id="progWrap"><div class="prog-bar" id="progBar"></div></div>
<div class="prog-lbl"  id="progLbl"></div>

<div id="results"></div>

</div>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let tab      = 'sfx';
let queue    = [];   // {file}
let results  = [];   // tagged row objects

// ── UI helpers ────────────────────────────────────────────────────────────────
function ev(e){ e.preventDefault(); }

function toggleKey(){
  const i=document.getElementById('apiKey'), b=document.getElementById('toggleBtn');
  i.type = i.type==='password'?'text':'password';
  b.textContent = i.type==='password'?'Show':'Hide';
}

function setTab(t, btn){
  tab = t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
}

function setStatus(msg, cls=''){
  const s=document.getElementById('statusMsg');
  s.textContent=msg; s.className='status '+(cls||'');
}

// ── File queue ────────────────────────────────────────────────────────────────
const EXTS = new Set(['.wav','.ogg','.mp3','.flac','.aiff','.aif']);

function onDrop(e){
  e.preventDefault();
  document.getElementById('drop').classList.remove('over');
  addFiles([...e.dataTransfer.files]);
}

function addFiles(files){
  const audio = [...files].filter(f => EXTS.has('.'+f.name.split('.').pop().toLowerCase()));
  if(!audio.length){ setStatus('No audio files found','err'); return; }
  audio.forEach(f => {
    if(!queue.find(q=>q.file.name===f.name && q.file.size===f.size))
      queue.push({file:f});
  });
  document.getElementById('runBtn').disabled = false;
  document.getElementById('clearBtn').style.display = '';
  setStatus(`${queue.length} file${queue.length>1?'s':''} ready`);
}

function clearAll(){
  queue=[]; results=[];
  document.getElementById('runBtn').disabled=true;
  document.getElementById('clearBtn').style.display='none';
  document.getElementById('copyAllBtn').style.display='none';
  document.getElementById('results').innerHTML='';
  document.getElementById('progWrap').style.display='none';
  document.getElementById('progLbl').textContent='';
  setStatus('');
}

// ── Audio analysis ────────────────────────────────────────────────────────────
async function analyseFile(file){
  const buf=await file.arrayBuffer();
  const Ctx=window.AudioContext||window.webkitAudioContext;
  const ctx=new Ctx();
  const dec=await ctx.decodeAudioData(buf.slice(0));
  const ch=dec.getChannelData(0);
  ctx.close();
  const dur=Math.round(dec.duration*10)/10;
  const durMs=Math.round(dec.duration*1000);
  const rms=calcRMS(ch);
  const channels=dec.numberOfChannels>1?'stereo':'mono';
  const sp=spectral(ch,dec.sampleRate);
  const bpm=Math.round(await estimateBPM(ch,dec.sampleRate));
  const key=estimateKey(ch,dec.sampleRate);
  return {filename:file.name,duration:dur,durationMs:durMs,bpm,key,
          rms:Math.round(rms*1000)/1000,channelLabel:channels,...sp};
}

function calcRMS(d){
  let s=0,n=0,step=Math.max(1,Math.floor(d.length/8000));
  for(let i=0;i<d.length;i+=step){s+=d[i]**2;n++;}
  return Math.sqrt(s/n);
}

function spectral(data,sr){
  const sz=Math.min(4096,data.length);
  const start=Math.floor(data.length*.1);
  const chunk=data.slice(start,start+sz);
  const w=new Float32Array(sz);
  for(let i=0;i<sz;i++) w[i]=chunk[i]*(0.5-0.5*Math.cos(2*Math.PI*i/sz));
  const bands=[{n:'sub',lo:20,hi:80},{n:'low',lo:80,hi:300},{n:'mid',lo:300,hi:2000},{n:'high',lo:2000,hi:8000}];
  const be={};let te=0,wf=0;
  for(const b of bands){
    let e=0,step=(b.hi-b.lo)/8;
    for(let f=b.lo;f<=b.hi;f+=step){
      if(f>sr/2)continue;
      const k=f/sr,cw=2*Math.cos(2*Math.PI*k);
      let s1=0,s2=0;
      for(let i=0;i<sz;i++){const s0=cw*s1-s2+w[i];s2=s1;s1=s0;}
      const m=Math.sqrt(s1*s1+s2*s2-s1*s2*cw);
      e+=m;wf+=m*f;te+=m;
    }
    be[b.n]=e;
  }
  const c=te>0?Math.round(wf/te):500;
  const tot=Object.values(be).reduce((a,b)=>a+b,0)||1;
  return{spectralCentroid:c,lowEnergyRatio:Math.round(100*(be.sub+be.low)/tot),
         highEnergyRatio:Math.round(100*(be.mid+be.high)/tot),
         dominantBand:Object.entries(be).sort((a,b)=>b[1]-a[1])[0][0]};
}

async function estimateBPM(data,sr){
  const tsr=4000,ratio=Math.floor(sr/tsr);
  const mf=Math.floor(Math.min(sr*30,data.length)/ratio);
  const ds=new Float32Array(mf);
  for(let i=0;i<mf;i++)ds[i]=data[i*ratio];
  const hop=Math.floor(tsr*.01),nh=Math.floor(ds.length/hop);
  const env=new Float32Array(nh);let prev=0;
  for(let h=0;h<nh;h++){
    let e=0;for(let i=0;i<hop;i++)e+=ds[h*hop+i]**2;
    const r=Math.sqrt(e/hop);env[h]=Math.max(0,r-prev);prev=r;
  }
  const mx=Math.max(...env)||1;
  for(let i=0;i<env.length;i++)env[i]/=mx;
  const hs=.01,mn=Math.round(60/200/hs),mxl=Math.round(60/50/hs);
  let bl=mn,bc=-Infinity;
  const cm=[60,70,80,90,100,110,120,130,140,150,160,170,180];
  for(let lag=mn;lag<=mxl;lag++){
    let c=0;const n=env.length-lag;if(n<=0)continue;
    for(let i=0;i<n;i++)c+=env[i]*env[i+lag];c/=n;
    const b=60/(lag*hs),nr=cm.reduce((a,b2)=>Math.abs(b2-b)<Math.abs(a-b)?b2:a);
    c*=1+.15*Math.exp(-((b-nr)**2)/50);
    if(c>bc){bc=c;bl=lag;}
  }
  if(bc<.002)return 0;
  let r=Math.round(60/(bl*hs));
  while(r>160)r=Math.round(r/2);while(r<60)r=Math.round(r*2);
  return(r<40||r>220)?0:r;
}

function estimateKey(data,sr){
  const notes=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const major=[6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
  const minor=[6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];
  const ch=new Array(12).fill(0);
  const step=Math.max(1,Math.floor(sr/200));
  const samp=data.slice(0,Math.min(sr*8,data.length));
  for(let i=0;i<samp.length-step;i+=step)
    for(let n=0;n<12;n++){
      const f=261.63*Math.pow(2,n/12),p=(i*f/sr)%1;
      ch[n]+=Math.abs(samp[i])*Math.cos(2*Math.PI*p);
    }
  const mx=Math.max(...ch)||1,cn=ch.map(v=>v/mx);
  function pear(a,b){
    const ma=a.reduce((s,v)=>s+v,0)/12,mb=b.reduce((s,v)=>s+v,0)/12;
    let num=0,da=0,db=0;
    for(let i=0;i<12;i++){const xa=a[i]-ma,xb=b[i]-mb;num+=xa*xb;da+=xa*xa;db+=xb*xb;}
    return num/(Math.sqrt(da*db)||1);
  }
  let bk='C major',bc=-999;
  for(let r=0;r<12;r++){
    const mj=major.map((_,i)=>major[(i-r+12)%12]),mn=minor.map((_,i)=>minor[(i-r+12)%12]);
    const mc=pear(cn,mj),nc=pear(cn,mn);
    if(mc>bc){bc=mc;bk=notes[r]+' major';}
    if(nc>bc){bc=nc;bk=notes[r]+' minor';}
  }
  return bk;
}

// ── Claude API ────────────────────────────────────────────────────────────────
async function callClaude(prompt,key){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,
             'anthropic-version':'2023-06-01',
             'anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
      messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`API ${res.status}`);}
  const d=await res.json();
  return JSON.parse((d.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
}

function buildPrompt(a,world){
  if(tab==='sfx') return `You are an expert game audio tagger. Return ONLY valid JSON — no markdown.

Audio: filename="${a.filename}", duration=${a.durationMs}ms, RMS=${a.rms}, spectralCentroid=${a.spectralCentroid}Hz, lowEnergy=${a.lowEnergyRatio}%, highEnergy=${a.highEnergyRatio}%, channels=${a.channelLabel}
World: "${world}"

VOCAL RULES: Assume vocal IS present unless filename says weapon_only/no_vocal/pure/door/footstep/ambient or action is draw/sheathe.
  female/woman/girl/_f_→female. male/man/knight/soldier→male. goblin/imp→monster growl high. orc/beast→monster growl low. boss/giant→monster roar. undead/banshee→monster shriek. mage→magic incantation.
  heavy/slow→grunt. light/fast→exhale. charge/power→battle cry. pain/hit_reaction→pain grunt.
WEIGHT: <300ms→very light. 300-600ms+highFreq>35%→light. 300-900ms→medium. >900ms→heavy. >1500ms→very heavy.

{"game_context":"game combat"|"game movement"|"game environment"|"game death"|"game reward"|"game UI","weapon_action":"strike"|"swing"|"throw"|"arch"|"magic cast"|"block"|"parry"|"draw"|"sheathe","weapon_type":"sword"|"greatsword"|"dagger"|"spear"|"axe"|"warhammer"|"bow"|"crossbow"|"staff"|"wand"|"fists"|"shield"|"arrow","weapon_material":"steel"|"iron"|"bronze"|"wood"|"bone"|"stone"|"crystal"|"arcane"|"shadow"|"wood, iron"|"wood, crystal"|"flesh, leather","holder_type":"heavy knight"|"light rogue"|"soldier"|"archer"|"mage"|"beast"|"goblin"|"giant"|"undead","holder_weight":"very heavy"|"heavy"|"medium"|"light"|"very light","motion_character":"heavy slow whoosh"|"fast sharp whoosh"|"short snap"|"long arc whoosh"|"arrow flight"|"no whoosh"|"spinning tumble"|"magic swirl","impact_surface":"armour"|"flesh"|"stone"|"wood"|"shield"|"ground"|"air"|"magic barrier","impact_character":"deep thud"|"sharp crack"|"metallic ring"|"wet impact"|"hollow knock"|"glancing blow"|"crushing impact"|"piercing"|"energy burst","elemental":"none"|"fire"|"lightning"|"ice"|"poison"|"shadow"|"arcane"|"wind","vocal":"none"|"male grunt heavy"|"male grunt medium"|"male exhale sharp"|"male battle cry"|"female grunt sharp"|"female exhale controlled"|"female battle cry"|"monster growl low"|"monster growl high"|"monster roar"|"monster shriek"|"pain grunt male"|"pain grunt female"|"pain cry monster"|"magic incantation","aftermath":"none"|"burn crackle"|"electric echo"|"dissolve"|"bleed"|"echo ring"|"shatter"|"thunder rumble"|"void resonance","space":"dry"|"small room"|"medium room"|"large hall"|"outdoor","intensity":"very low intensity"|"low intensity"|"mid intensity"|"high intensity"|"very high intensity","channel":"mono"|"stereo","variant_id":"","technical_flags":"one-shot, mono, dry","warnings":""}`;

  if(tab==='music') return `You are an expert game audio tagger. Return ONLY valid JSON.
Audio: filename="${a.filename}", duration=${a.duration}s, BPM=${a.bpm||'unclear'}, key=${a.key}, RMS=${a.rms}, channels=${a.channelLabel}, world="${world}"
{"asset_type":"music"|"stinger"|"ambience","game_context":"game combat"|"game exploration"|"game boss fight"|"game menu"|"game cutscene"|"game ambient","instrumentation":"comma-separated instruments","mood_primary":"aggressive"|"tense"|"melancholic"|"eerie"|"triumphant"|"hopeful"|"desperate"|"calm"|"mysterious"|"dread","mood_secondary":"same or empty","intensity":"very low intensity"|"low intensity"|"mid intensity"|"high intensity"|"very high intensity","key_confirmed":"full key e.g. D minor","bpm_confirmed":0,"structure":"loop, no arc"|"builds to climax"|"intro then loop"|"verse build drop"|"slow build"|"climax then resolve"|"short sting no arc","loop_ready":"yes"|"no","technical_flags":"loop-ready, no intro, no outro, stereo","warnings":""}`;

  return `You are an expert game audio tagger. Return ONLY valid JSON.
Audio: filename="${a.filename}", duration=${a.duration}s, RMS=${a.rms}, channels=${a.channelLabel}, world="${world}"
{"asset_type":"ui sound","game_context":"game UI","interaction_type":"confirm"|"cancel"|"hover"|"scroll"|"error"|"success"|"notification"|"reward"|"transition","tonal_character":"bright"|"warm"|"neutral"|"digital"|"organic"|"dark"|"metallic"|"wooden","sound_source":"what makes this sound","mood":"positive"|"negative"|"neutral"|"triumphant","intensity":"very low intensity"|"low intensity"|"mid intensity"|"high intensity"|"very high intensity","tonal_match":"yes"|"partial"|"no","channel":"mono"|"stereo","technical_flags":"one-shot, stereo, short transient","warnings":""}`;
}

// ── Run all ───────────────────────────────────────────────────────────────────
async function runAll(){
  const key=document.getElementById('apiKey').value.trim();
  const world=document.getElementById('worldChar').value.trim()||'dark gothic fantasy';
  if(!key){setStatus('Enter Anthropic API key first','err');return;}
  if(!queue.length){setStatus('No files queued','err');return;}

  document.getElementById('runBtn').disabled=true;
  document.getElementById('progWrap').style.display='block';
  results=[];
  document.getElementById('results').innerHTML='';

  const bar=document.getElementById('progBar');
  const lbl=document.getElementById('progLbl');

  for(let i=0;i<queue.length;i++){
    const q=queue[i];
    lbl.textContent=`Tagging ${i+1} of ${queue.length} — ${q.file.name}`;
    bar.style.width=Math.round((i/queue.length)*100)+'%';

    // Show working card
    renderCard(i, q.file.name, null, true);

    try{
      const audio=await analyseFile(q.file);
      const tags=await callClaude(buildPrompt(audio,world),key);
      const row={filename:q.file.name,duration:audio.duration,
                 world_character:world,...tags};
      row.caption=buildCaption(row,world);
      results.push(row);
      renderCard(i,q.file.name,row,false);
    }catch(e){
      results.push({filename:q.file.name,_error:String(e)});
      renderCard(i,q.file.name,null,false,String(e));
    }
  }

  bar.style.width='100%';
  lbl.textContent=`Done — ${results.filter(r=>!r._error).length} tagged`;
  setStatus(`${results.filter(r=>!r._error).length} files tagged`);
  document.getElementById('runBtn').disabled=false;
  document.getElementById('copyAllBtn').style.display='';
}

// ── Caption ───────────────────────────────────────────────────────────────────
function buildCaption(d,world){
  const p=[world];
  if(tab==='sfx'){
    ['asset_type','weapon_action','weapon_type'].forEach(f=>{if(d[f])p.push(d[f]);});
    if(d.weapon_material)p.push(d.weapon_material+' weapon');
    ['holder_type','holder_weight','motion_character'].forEach(f=>{if(d[f])p.push(d[f]);});
    if(d.impact_surface&&d.impact_surface!=='air')p.push('hits '+d.impact_surface);
    if(d.impact_character)p.push(d.impact_character);
    if(d.elemental&&d.elemental!=='none')p.push(d.elemental+' elemental');
    if(d.vocal&&d.vocal!=='none')p.push(d.vocal);
    if(d.aftermath&&d.aftermath!=='none')p.push('aftermath: '+d.aftermath);
    ['space','intensity','channel','game_context','technical_flags'].forEach(f=>{if(d[f])p.push(d[f]);});
  } else if(tab==='music'){
    if(d.asset_type)p.push(d.asset_type);
    if(d.instrumentation)p.push(d.instrumentation);
    const m=d.mood_secondary?`${d.mood_primary} and ${d.mood_secondary}`:d.mood_primary;
    if(m)p.push(m);
    if(d.intensity)p.push(d.intensity);
    if(d.key_confirmed&&d.key_confirmed!=='—')p.push(d.key_confirmed);
    if(d.bpm_confirmed&&d.bpm_confirmed!==0)p.push(d.bpm_confirmed+' BPM');
    if(d.structure)p.push(d.structure);
    if(d.game_context)p.push(d.game_context);
    if(d.loop_ready)p.push('loop: '+d.loop_ready);
    if(d.technical_flags)p.push(d.technical_flags);
  } else {
    if(d.asset_type)p.push(d.asset_type);
    if(d.sound_source)p.push(d.sound_source+' source');
    if(d.interaction_type)p.push(d.interaction_type+' interaction');
    if(d.tonal_character)p.push(d.tonal_character+' tonal character');
    if(d.mood)p.push(d.mood+' mood');
    ['intensity','tonal_match','channel','game_context','technical_flags'].forEach(f=>{if(d[f])p.push(d[f]);});
  }
  return p.join(', ');
}

// ── Column order (matches sheet tab) ─────────────────────────────────────────
function getCols(){
  if(tab==='sfx') return ['filename','duration','world_character','asset_type','game_context',
    'weapon_action','weapon_type','weapon_material','holder_type','holder_weight',
    'motion_character','impact_surface','impact_character','elemental','vocal','aftermath',
    'space','intensity','channel','variant_id','technical_flags','caption'];
  if(tab==='music') return ['filename','duration','world_character','asset_type','game_context',
    'instrumentation','mood_primary','mood_secondary','intensity',
    'key_confirmed','bpm_confirmed','structure','loop_ready','technical_flags','caption'];
  return ['filename','duration','world_character','asset_type','game_context',
    'interaction_type','tonal_character','sound_source','mood',
    'intensity','tonal_match','channel','technical_flags','caption'];
}

function rowToTSV(row){
  return getCols().map(c=>String(row[c]??'')).join('\t');
}

// ── Render a single result card ───────────────────────────────────────────────
function renderCard(idx,filename,row,loading,error){
  const container=document.getElementById('results');
  let card=document.getElementById('card-'+idx);
  if(!card){
    card=document.createElement('div');
    card.className='result-card';
    card.id='card-'+idx;
    container.appendChild(card);
  }

  if(loading){
    card.innerHTML=`<div class="result-header">
      <div class="result-filename">${filename}</div>
      <div class="result-status"><span class="spinner"></span></div>
    </div>`;
    return;
  }

  if(error){
    card.innerHTML=`<div class="result-header">
      <div class="result-filename">${filename}</div>
      <div class="result-status err">error</div>
    </div>
    <div class="result-body" style="color:var(--red);font-size:12px">${error}</div>`;
    return;
  }

  const cols=getCols();
  const autoFields=new Set(['filename','duration']);
  const worldFields=new Set(['world_character']);

  const fieldsHtml=cols.map(col=>{
    const val=row[col]??'';
    if(col==='caption') return '';
    const cls=autoFields.has(col)?'auto':worldFields.has(col)?'world':'ai';
    const empty=!val||val==='—';
    return `<div class="field">
      <div class="field-label">${col.replace(/_/g,' ')}</div>
      <div class="field-value ${empty?'empty':cls}">${empty?'—':val}</div>
      ${empty?'':`<button class="field-copy" title="Copy" onclick="copyVal(this,'${String(val).replace(/'/g,"\\'")}')">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>`}
    </div>`;
  }).join('');

  card.innerHTML=`<div class="result-header">
    <div class="result-filename">${filename}</div>
    <div class="result-status ok">✓ tagged</div>
  </div>
  <div class="result-body">
    <div class="fields">${fieldsHtml}</div>
    <div class="caption-box">${row.caption||''}</div>
    <button class="copy-row-btn" id="copyrow-${idx}" onclick="copyRow(${idx})">
      Copy full row (tab-separated — paste into sheet)
    </button>
  </div>`;
}

// ── Copy helpers ──────────────────────────────────────────────────────────────
function copyVal(btn,val){
  navigator.clipboard.writeText(val).then(()=>{
    const orig=btn.innerHTML;
    btn.querySelector('svg').style.stroke='var(--green)';
    setTimeout(()=>btn.querySelector('svg').style.stroke='',1500);
  });
}

function copyRow(idx){
  const row=results[idx];
  if(!row||row._error)return;
  navigator.clipboard.writeText(rowToTSV(row)).then(()=>{
    const btn=document.getElementById('copyrow-'+idx);
    if(!btn)return;
    btn.textContent='✓ Copied — go to your sheet and paste';
    btn.classList.add('copied');
    setTimeout(()=>{
      btn.textContent='Copy full row (tab-separated — paste into sheet)';
      btn.classList.remove('copied');
    },3000);
  });
}

function copyAll(){
  const good=results.filter(r=>!r._error);
  if(!good.length)return;
  const tsv=good.map(r=>rowToTSV(r)).join('\n');
  navigator.clipboard.writeText(tsv).then(()=>{
    const btn=document.getElementById('copyAllBtn');
    btn.textContent='✓ All rows copied';
    btn.classList.add('primary');
    setTimeout(()=>{btn.textContent='Copy all rows';btn.classList.remove('primary');},3000);
  });
}
</script>
