<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Audio Tagger</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0f0f17;
  --s1:      #1a1a2e;
  --s2:      #232338;
  --border:  #2e2e4a;
  --text:    #e8e8f0;
  --muted:   #8888aa;
  --blue:    #4a9eff;
  --green:   #3ecf8e;
  --purple:  #a78bfa;
  --amber:   #fbbf24;
  --red:     #f87171;
  --radius:  10px;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px 16px 40px; }
.app { max-width: 1100px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 3px; }
.sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.card { background: var(--s1); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
input[type=text], input[type=password] {
  width: 100%; padding: 8px 11px; background: var(--s2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); font-size: 13px; outline: none;
}
input:focus { border-color: var(--blue); }
button {
  padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: var(--s2);
  color: var(--text); transition: all 0.15s;
}
button:hover { border-color: var(--blue); color: var(--blue); }
button.primary { background: rgba(74,158,255,0.15); border-color: var(--blue); color: var(--blue); }
button.primary:hover { background: rgba(74,158,255,0.28); }
button.success { background: rgba(62,207,142,0.15); border-color: var(--green); color: var(--green); }
button.danger  { background: rgba(248,113,113,0.12); border-color: var(--red); color: var(--red); }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.tab-row { display: flex; gap: 6px; margin-bottom: 14px; }
.tab { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.15s; }
.tab.active { background: rgba(74,158,255,0.15); border-color: var(--blue); color: var(--blue); }
.drop {
  border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 28px 20px;
  text-align: center; cursor: pointer; transition: all 0.15s; position: relative;
}
.drop:hover, .drop.over { border-color: var(--green); background: rgba(62,207,142,0.04); }
.drop input { display: none; }
.drop-icon { width: 34px; height: 34px; margin: 0 auto 8px; border-radius: 50%; background: rgba(62,207,142,0.12); display: flex; align-items: center; justify-content: center; }
.drop-icon svg { width: 17px; height: 17px; stroke: var(--green); fill: none; stroke-width: 2; }
.drop-title { font-size: 14px; font-weight: 500; }
.drop-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
/* Queue */
#queue { display: none; margin-top: 10px; }
.q-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; background: var(--s2); border-radius: 7px; margin-bottom: 5px; font-size: 12px; }
.q-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.q-status { font-size: 11px; min-width: 70px; text-align: right; }
.q-status.pending  { color: var(--muted); }
.q-status.working  { color: var(--blue); }
.q-status.done     { color: var(--green); }
.q-status.error    { color: var(--red); }
.spinner { width: 12px; height: 12px; border: 2px solid rgba(74,158,255,0.3); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
/* Progress */
#progress-bar-wrap { background: var(--border); border-radius: 4px; height: 4px; margin: 10px 0 4px; display: none; }
#progress-bar { height: 4px; background: var(--blue); border-radius: 4px; transition: width 0.3s; width: 0%; }
#progress-label { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
/* Review table */
#review-section { display: none; margin-top: 16px; }
.review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.review-title { font-size: 14px; font-weight: 500; }
.review-actions { display: flex; gap: 8px; align-items: center; }
.select-all-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; color: var(--muted); }
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 1200px; }
thead th {
  background: var(--s2); color: var(--muted); font-weight: 500; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 8px; text-align: left;
  position: sticky; top: 0; border-bottom: 1px solid var(--border); white-space: nowrap;
}
tbody tr { border-bottom: 0.5px solid var(--border); transition: background 0.1s; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody tr.selected { background: rgba(62,207,142,0.05); }
tbody tr.has-error { background: rgba(248,113,113,0.05); }
td { padding: 6px 8px; vertical-align: top; }
td.check-cell { width: 30px; text-align: center; }
td input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--green); }
td.filename-cell { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); font-weight: 500; }
td.editable { cursor: text; }
td.editable:hover { background: rgba(74,158,255,0.08); border-radius: 4px; }
[contenteditable] { outline: none; }
[contenteditable]:focus { background: rgba(74,158,255,0.12); border-radius: 4px; padding: 1px 3px; }
.tag-auto   { color: var(--blue); }
.tag-ai     { color: var(--green); }
.tag-world  { color: var(--purple); }
.tag-warn   { color: var(--amber); }
.tag-error  { color: var(--red); font-size: 10px; }
.push-bar { display: none; position: sticky; bottom: 0; background: var(--s1); border-top: 1px solid var(--border); padding: 12px 18px; margin-top: 14px; border-radius: 0 0 var(--radius) var(--radius); display: none; align-items: center; gap: 12px; }
.push-count { font-size: 13px; color: var(--muted); flex: 1; }
.push-count span { color: var(--green); font-weight: 500; }
#status-bar { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 18px; }
#status-bar.ok  { color: var(--green); }
#status-bar.err { color: var(--red); }
</style>
</head>
<body>
<div class="app">

<h1>Game Audio Tagger</h1>
<p class="sub">Drop multiple files — review all tags — push confirmed rows to your Google Sheet</p>

<!-- Config -->
<div class="card">
  <div class="row3">
    <div>
      <label>Anthropic API key</label>
      <div style="display:flex;gap:6px">
        <input type="password" id="apiKey" placeholder="sk-ant-...">
        <button onclick="toggleKey()" style="padding:8px 10px;flex-shrink:0" id="toggleBtn">Show</button>
      </div>
    </div>
    <div>
      <label>World character</label>
      <input type="text" id="worldChar" value="dark gothic fantasy" placeholder="e.g. dark gothic fantasy">
    </div>
    <div>
      <label>Google Sheet ID <span style="color:var(--muted)">(for push)</span></label>
      <input type="text" id="sheetId" placeholder="1JF5QpH-3dQLwPne0N1i-...">
    </div>
  </div>
</div>

<!-- Tab selector -->
<div class="tab-row">
  <button class="tab active" onclick="setTab('sfx',this)">SFX</button>
  <button class="tab" onclick="setTab('music',this)">Music</button>
  <button class="tab" onclick="setTab('ui',this)">UI Sound</button>
</div>

<!-- Drop zone -->
<div class="card">
  <div class="drop" id="dropzone"
       onclick="document.getElementById('fileIn').click()"
       ondragover="ev(event);this.classList.add('over')"
       ondragleave="this.classList.remove('over')"
       ondrop="handleDrop(event)">
    <input type="file" id="fileIn" accept="audio/*,.ogg,.wav,.mp3,.flac,.aiff" multiple
           onchange="addFiles(this.files)">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24"><path d="M9 19V6l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg>
    </div>
    <div class="drop-title">Drop audio files here</div>
    <div class="drop-sub">WAV · OGG · MP3 · FLAC — select multiple or drop a folder</div>
  </div>

  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="progress-label"></div>

  <div id="queue"></div>

  <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
    <button class="primary" id="runBtn" onclick="runAll()" disabled>Analyse & Tag all</button>
    <button onclick="clearAll()" id="clearBtn" style="display:none">Clear</button>
    <div id="status-bar"></div>
  </div>
</div>

<!-- Review table -->
<div id="review-section">
  <div class="review-header">
    <div class="review-title">Review tags</div>
    <div class="review-actions">
      <button onclick="selectAll(true)"  style="font-size:11px;padding:5px 10px">Select all</button>
      <button onclick="selectAll(false)" style="font-size:11px;padding:5px 10px">Deselect all</button>
      <button class="danger" onclick="removeSelected()" style="font-size:11px;padding:5px 10px">Remove selected</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="push-bar" id="pushBar">
    <div class="push-count">
      <span id="selectedCount">0</span> rows selected to push
    </div>
    <button class="primary" onclick="downloadCSV()">Download CSV</button>
    <button class="success" onclick="pushToSheet()" id="pushBtn">Push to Google Sheet</button>
  </div>
</div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let currentTab = 'sfx';
let fileQueue  = [];   // {file, status, result}
let tableRows  = [];   // tagged + reviewed rows

// ── Helpers ───────────────────────────────────────────────────────────────────
function ev(e) { e.preventDefault(); }
function toggleKey() {
  const i = document.getElementById('apiKey');
  const b = document.getElementById('toggleBtn');
  i.type = i.type === 'password' ? 'text' : 'password';
  b.textContent = i.type === 'password' ? 'Show' : 'Hide';
}
function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}
function setStatus(msg, type = '') {
  const s = document.getElementById('status-bar');
  s.textContent = msg;
  s.className = type ? type : '';
}

// ── File handling ─────────────────────────────────────────────────────────────
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropzone').classList.remove('over');
  const items = e.dataTransfer.items;
  const files = [];
  if (items) {
    for (const item of items) {
      if (item.kind === 'file') files.push(item.getAsFile());
    }
  } else {
    for (const f of e.dataTransfer.files) files.push(f);
  }
  addFiles(files);
}

const AUDIO_EXTS = new Set(['.wav','.ogg','.mp3','.flac','.aiff','.aif']);

function addFiles(files) {
  const audioFiles = [...files].filter(f => {
    const ext = '.' + f.name.split('.').pop().toLowerCase();
    return AUDIO_EXTS.has(ext);
  });

  if (!audioFiles.length) {
    setStatus('No audio files found in selection', 'err');
    return;
  }

  audioFiles.forEach(f => {
    // Avoid duplicates within the queue
    if (!fileQueue.find(q => q.file.name === f.name && q.file.size === f.size)) {
      fileQueue.push({ file: f, status: 'pending', result: null });
    }
  });

  renderQueue();
  document.getElementById('runBtn').disabled = false;
  document.getElementById('clearBtn').style.display = '';
  setStatus(`${fileQueue.length} file${fileQueue.length > 1 ? 's' : ''} queued`);
}

function renderQueue() {
  const el = document.getElementById('queue');
  if (!fileQueue.length) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = fileQueue.map((q, i) => `
    <div class="q-item" id="qi-${i}">
      <div class="q-name" title="${q.file.name}">${q.file.name}</div>
      <div class="q-status ${q.status}" id="qs-${i}">
        ${q.status === 'working' ? '<span class="spinner"></span>' :
          q.status === 'done'    ? '✓ tagged' :
          q.status === 'error'   ? '✗ error' : 'pending'}
      </div>
    </div>`).join('');
}

function clearAll() {
  fileQueue = [];
  tableRows = [];
  renderQueue();
  document.getElementById('runBtn').disabled = true;
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('review-section').style.display = 'none';
  document.getElementById('progress-bar-wrap').style.display = 'none';
  document.getElementById('progress-label').textContent = '';
  setStatus('');
}

// ── Audio analysis (browser-side) ─────────────────────────────────────────────
async function analyseFile(file) {
  const buf     = await file.arrayBuffer();
  const Ctx     = window.AudioContext || window.webkitAudioContext;
  const ctx     = new Ctx();
  const decoded = await ctx.decodeAudioData(buf.slice(0));
  const ch0     = decoded.getChannelData(0);
  ctx.close();

  const duration    = Math.round(decoded.duration * 10) / 10;
  const durationMs  = Math.round(decoded.duration * 1000);
  const rms         = Math.round(calcRMS(ch0) * 1000) / 1000;
  const channels    = decoded.numberOfChannels > 1 ? 'stereo' : 'mono';
  const spectral    = analyseSpectral(ch0, decoded.sampleRate);
  const bpm         = Math.round(await estimateBPM(ch0, decoded.sampleRate));
  const key         = estimateKey(ch0, decoded.sampleRate);

  return { filename: file.name, duration, durationMs, bpm, key, rms,
           channelLabel: channels, ...spectral };
}

function calcRMS(d) {
  let s = 0, n = 0;
  const step = Math.max(1, Math.floor(d.length / 8000));
  for (let i = 0; i < d.length; i += step) { s += d[i]**2; n++; }
  return Math.sqrt(s / n);
}

function analyseSpectral(data, sr) {
  const chunkSize = Math.min(4096, data.length);
  const start = Math.floor(data.length * 0.1);
  const chunk = data.slice(start, start + chunkSize);
  const windowed = new Float32Array(chunkSize);
  for (let i = 0; i < chunkSize; i++)
    windowed[i] = chunk[i] * (0.5 - 0.5 * Math.cos(2 * Math.PI * i / chunkSize));

  const bands = [
    { name:'sub',  lo:20,   hi:80   },
    { name:'low',  lo:80,   hi:300  },
    { name:'mid',  lo:300,  hi:2000 },
    { name:'high', lo:2000, hi:8000 },
  ];
  const bandEnergy = {};
  let totalE = 0, weightedF = 0;

  for (const band of bands) {
    let e = 0;
    const step = (band.hi - band.lo) / 8;
    for (let f = band.lo; f <= band.hi; f += step) {
      if (f > sr / 2) continue;
      const k = f / sr, w = 2 * Math.PI * k, cw = 2 * Math.cos(w);
      let s1 = 0, s2 = 0;
      for (let i = 0; i < chunkSize; i++) {
        const s0 = cw*s1 - s2 + windowed[i]; s2 = s1; s1 = s0;
      }
      const mag = Math.sqrt(s1*s1 + s2*s2 - s1*s2*cw);
      e += mag; weightedF += mag * f; totalE += mag;
    }
    bandEnergy[band.name] = e;
  }
  const centroid    = totalE > 0 ? Math.round(weightedF / totalE) : 500;
  const total       = Object.values(bandEnergy).reduce((a,b)=>a+b,0) || 1;
  const lowRatio    = Math.round(100*(bandEnergy.sub+bandEnergy.low)/total);
  const highRatio   = Math.round(100*(bandEnergy.mid+bandEnergy.high)/total);
  const dominantBand = Object.entries(bandEnergy).sort((a,b)=>b[1]-a[1])[0][0];
  return { spectralCentroid: centroid, lowEnergyRatio: lowRatio,
           highEnergyRatio: highRatio, dominantBand };
}

async function estimateBPM(data, sr) {
  const targetSr = 4000, ratio = Math.floor(sr / targetSr);
  const maxFrames = Math.floor(Math.min(sr*30, data.length) / ratio);
  const ds = new Float32Array(maxFrames);
  for (let i = 0; i < maxFrames; i++) ds[i] = data[i * ratio];
  const hopSize = Math.floor(targetSr * 0.01);
  const numHops = Math.floor(ds.length / hopSize);
  const env = new Float32Array(numHops);
  let prev = 0;
  for (let h = 0; h < numHops; h++) {
    let e = 0;
    for (let i = 0; i < hopSize; i++) e += ds[h*hopSize+i]**2;
    const rms = Math.sqrt(e/hopSize);
    env[h] = Math.max(0, rms - prev); prev = rms;
  }
  const maxE = Math.max(...env) || 1;
  for (let i = 0; i < env.length; i++) env[i] /= maxE;
  const hopSecs = 0.01;
  const minLag = Math.round(60/200/hopSecs), maxLag = Math.round(60/50/hopSecs);
  let bestLag = minLag, bestCorr = -Infinity;
  const common = [60,70,80,90,100,110,120,130,140,150,160,170,180];
  for (let lag = minLag; lag <= maxLag; lag++) {
    let corr = 0; const n = env.length - lag; if (n <= 0) continue;
    for (let i = 0; i < n; i++) corr += env[i] * env[i+lag];
    corr /= n;
    const bpmAtLag = 60/(lag*hopSecs);
    const nearest = common.reduce((a,b) => Math.abs(b-bpmAtLag)<Math.abs(a-bpmAtLag)?b:a);
    corr *= 1 + 0.15*Math.exp(-((bpmAtLag-nearest)**2)/50);
    if (corr > bestCorr) { bestCorr = corr; bestLag = lag; }
  }
  if (bestCorr < 0.002) return 0;
  let r = Math.round(60/(bestLag*hopSecs));
  while (r > 160) r = Math.round(r/2);
  while (r < 60)  r = Math.round(r*2);
  return (r < 40 || r > 220) ? 0 : r;
}

function estimateKey(data, sr) {
  const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const major = [6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
  const minor = [6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];
  const chroma = new Array(12).fill(0);
  const step = Math.max(1, Math.floor(sr/200));
  const sample = data.slice(0, Math.min(sr*8, data.length));
  for (let i = 0; i < sample.length-step; i += step)
    for (let n = 0; n < 12; n++) {
      const freq = 261.63 * Math.pow(2, n/12);
      const phase = (i * freq / sr) % 1;
      chroma[n] += Math.abs(sample[i]) * Math.cos(2*Math.PI*phase);
    }
  const mx = Math.max(...chroma)||1;
  const cn = chroma.map(v=>v/mx);
  function pearson(a,b) {
    const ma=a.reduce((s,v)=>s+v,0)/12, mb=b.reduce((s,v)=>s+v,0)/12;
    let num=0,da=0,db=0;
    for(let i=0;i<12;i++){const xa=a[i]-ma,xb=b[i]-mb;num+=xa*xb;da+=xa*xa;db+=xb*xb;}
    return num/(Math.sqrt(da*db)||1);
  }
  let bestKey='C major', bestCorr=-999;
  for (let root=0; root<12; root++) {
    const maj=major.map((_,i)=>major[(i-root+12)%12]);
    const min=minor.map((_,i)=>minor[(i-root+12)%12]);
    const mc=pearson(cn,maj), nc=pearson(cn,min);
    if(mc>bestCorr){bestCorr=mc;bestKey=notes[root]+' major';}
    if(nc>bestCorr){bestCorr=nc;bestKey=notes[root]+' minor';}
  }
  return bestKey;
}

// ── Claude API ────────────────────────────────────────────────────────────────
function buildPrompt(a, world, tab) {
  if (tab === 'sfx') return `You are an expert game audio tagger. Return ONLY valid JSON — no markdown, no explanation.

Audio: filename="${a.filename}", duration=${a.durationMs}ms, RMS=${a.rms}, spectralCentroid=${a.spectralCentroid}Hz, lowEnergy=${a.lowEnergyRatio}%, highEnergy=${a.highEnergyRatio}%, channels=${a.channelLabel}
World: "${world}"

REASONING — apply in order:
STEP1 VOCAL: Assume vocal IS present unless filename says weapon_only/no_vocal/pure/door/footstep/ambient OR action is draw/sheathe.
  female/woman/girl/_f_→female type. male/man/knight/soldier→male. goblin/imp→monster growl high. orc/beast→monster growl low. boss/giant/dragon→monster roar. undead/banshee→monster shriek. mage/wizard→magic incantation.
  heavy/slow→grunt. light/fast→exhale. charge/power→battle cry. hit_reaction/pain→pain grunt.
STEP2 WEIGHT: <300ms→very light. 300-600ms+highFreq>35%→light. 300-900ms→medium. >900ms OR lowEnergy>45%→heavy. >1500ms→very heavy.

Return JSON:

async function callClaude(prompt, apiKey) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) {
    const e = await res.json();
    throw new Error(e.error?.message || `API ${res.status}`);
  }
  const data = await res.json();
  const raw  = data.content?.[0]?.text || '';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

// ── Run all ───────────────────────────────────────────────────────────────────
async function runAll() {
  const apiKey    = document.getElementById('apiKey').value.trim();
  const world     = document.getElementById('worldChar').value.trim() || 'dark gothic fantasy';
  if (!apiKey) { setStatus('Enter your Anthropic API key first', 'err'); return; }

  const pending = fileQueue.filter(q => q.status === 'pending');
  if (!pending.length) { setStatus('All files already tagged', ''); return; }

  document.getElementById('runBtn').disabled = true;
  const wrap = document.getElementById('progress-bar-wrap');
  const bar  = document.getElementById('progress-bar');
  const lbl  = document.getElementById('progress-label');
  wrap.style.display = 'block';

  let done = 0;
  for (let i = 0; i < fileQueue.length; i++) {
    const q = fileQueue[i];
    if (q.status !== 'pending') continue;

    q.status = 'working';
    renderQueue();
    lbl.textContent = `Tagging ${done+1} of ${pending.length} — ${q.file.name}`;

    try {
      const audio   = await analyseFile(q.file);
      const prompt  = buildPrompt(audio, world, currentTab);
      const tags    = await callClaude(prompt, apiKey);

      // Merge
      const row = {
        filename:       q.file.name,
        duration:       audio.duration,
        world_character: world,
        ...tags,
      };
      // Build caption
      row.caption = buildCaption(row, world, currentTab);

      q.status = 'done';
      q.result = row;
      tableRows.push(row);
    } catch(e) {
      q.status = 'error';
      q.result = { filename: q.file.name, _error: String(e) };
      tableRows.push(q.result);
    }

    done++;
    bar.style.width = Math.round((done / pending.length) * 100) + '%';
    renderQueue();
  }

  lbl.textContent = `Done — ${done} files tagged`;
  setStatus(`${tableRows.filter(r=>!r._error).length} tagged, ${tableRows.filter(r=>r._error).length} errors`, '');
  renderTable();
  document.getElementById('runBtn').disabled = false;
}

// ── Caption builders ──────────────────────────────────────────────────────────
function buildCaption(d, world, tab) {
  const p = [world];
  if (tab === 'sfx') {
    ['asset_type','weapon_action','weapon_type'].forEach(f => { if(d[f]) p.push(d[f]); });
    if (d.weapon_material) p.push(d.weapon_material+' weapon');
    ['holder_type','holder_weight','motion_character'].forEach(f => { if(d[f]) p.push(d[f]); });
    if (d.impact_surface && d.impact_surface !== 'air') p.push('hits '+d.impact_surface);
    if (d.impact_character) p.push(d.impact_character);
    if (d.elemental && d.elemental !== 'none') p.push(d.elemental+' elemental');
    if (d.vocal && d.vocal !== 'none') p.push(d.vocal);
    if (d.aftermath && d.aftermath !== 'none') p.push('aftermath: '+d.aftermath);
    ['space','intensity','channel','game_context','technical_flags'].forEach(f => { if(d[f]) p.push(d[f]); });
  } else if (tab === 'music') {
    if (d.asset_type) p.push(d.asset_type);
    if (d.instrumentation) p.push(d.instrumentation);
    const m = d.mood_secondary ? `${d.mood_primary} and ${d.mood_secondary}` : d.mood_primary;
    if (m) p.push(m);
    if (d.intensity) p.push(d.intensity);
    if (d.key_confirmed && d.key_confirmed !== '—') p.push(d.key_confirmed);
    if (d.bpm_confirmed && d.bpm_confirmed !== 0) p.push(d.bpm_confirmed+' BPM');
    if (d.structure) p.push(d.structure);
    if (d.game_context) p.push(d.game_context);
    if (d.loop_ready) p.push('loop: '+d.loop_ready);
    if (d.technical_flags) p.push(d.technical_flags);
  } else {
    ['asset_type'].forEach(f=>{if(d[f])p.push(d[f]);});
    if (d.sound_source) p.push(d.sound_source+' source');
    if (d.interaction_type) p.push(d.interaction_type+' interaction');
    if (d.tonal_character) p.push(d.tonal_character+' tonal character');
    if (d.mood) p.push(d.mood+' mood');
    ['intensity','tonal_match','channel','game_context','technical_flags'].forEach(f=>{if(d[f])p.push(d[f]);});
  }
  return p.join(', ');
}

// ── Review table ──────────────────────────────────────────────────────────────
function getColumns(tab) {
  if (tab === 'sfx') return [
    'filename','duration','world_character','asset_type','game_context',
    'weapon_action','weapon_type','weapon_material','holder_type','holder_weight',
    'motion_character','impact_surface','impact_character',
    'elemental','vocal','aftermath',
    'space','intensity','channel','variant_id','technical_flags','caption'
  ];
  if (tab === 'music') return [
    'filename','duration','world_character','asset_type','game_context',
    'instrumentation','mood_primary','mood_secondary','intensity',
    'key_confirmed','bpm_confirmed','structure','loop_ready','technical_flags','caption'
  ];
  return [
    'filename','duration','world_character','asset_type','game_context',
    'interaction_type','tonal_character','sound_source','mood',
    'intensity','tonal_match','channel','technical_flags','caption'
  ];
}

function renderTable() {
  const section = document.getElementById('review-section');
  const head    = document.getElementById('tableHead');
  const body    = document.getElementById('tableBody');
  const cols    = getColumns(currentTab);

  section.style.display = 'block';

  // Header
  head.innerHTML = `<tr>
    <th><input type="checkbox" onchange="selectAll(this.checked)" id="masterCb"></th>
    ${cols.map(c => `<th>${c.replace(/_/g,' ')}</th>`).join('')}
  </tr>`;

  // Body
  body.innerHTML = tableRows.map((row, ri) => {
    if (row._error) {
      return `<tr class="has-error">
        <td class="check-cell"><input type="checkbox" data-idx="${ri}"></td>
        <td class="filename-cell">${row.filename}</td>
        <td colspan="${cols.length-1}" class="tag-error">Error: ${row._error}</td>
      </tr>`;
    }
    const cells = cols.map(col => {
      const val = row[col] ?? '';
      const cls = col === 'filename' ? 'filename-cell' :
                  col === 'world_character' ? 'tag-world' :
                  col === 'caption' ? 'tag-ai' :
                  ['duration'].includes(col) ? 'tag-auto' : 'tag-ai';
      return `<td class="${cls} editable" contenteditable="true"
                  onblur="updateCell(${ri},'${col}',this)"
                  style="${col==='caption'?'min-width:260px;white-space:normal;':'white-space:nowrap;'}"
                  >${val}</td>`;
    });
    return `<tr id="tr-${ri}">
      <td class="check-cell"><input type="checkbox" data-idx="${ri}" onchange="updatePushBar()"></td>
      ${cells.join('')}
    </tr>`;
  }).join('');

  updatePushBar();
}

function updateCell(idx, col, el) {
  tableRows[idx][col] = el.textContent.trim();
}

function selectAll(checked) {
  document.querySelectorAll('#tableBody input[type=checkbox]').forEach(cb => {
    cb.checked = checked;
    const tr = cb.closest('tr');
    if (tr) tr.classList.toggle('selected', checked);
  });
  const master = document.getElementById('masterCb');
  if (master) master.checked = checked;
  updatePushBar();
}

function updatePushBar() {
  const checked = document.querySelectorAll('#tableBody input[type=checkbox]:checked').length;
  const bar = document.getElementById('pushBar');
  bar.style.display = checked > 0 ? 'flex' : 'none';
  document.getElementById('selectedCount').textContent = checked;
}

function removeSelected() {
  const toRemove = new Set();
  document.querySelectorAll('#tableBody input[type=checkbox]:checked').forEach(cb => {
    toRemove.add(parseInt(cb.dataset.idx));
  });
  tableRows = tableRows.filter((_, i) => !toRemove.has(i));
  fileQueue = fileQueue.filter(q => !toRemove.has(tableRows.indexOf(q.result)));
  renderTable();
  renderQueue();
}

// ── Download CSV ──────────────────────────────────────────────────────────────
function getSelectedRows() {
  const selected = [];
  document.querySelectorAll('#tableBody input[type=checkbox]:checked').forEach(cb => {
    selected.push(tableRows[parseInt(cb.dataset.idx)]);
  });
  return selected.filter(r => r && !r._error);
}

function downloadCSV() {
  const rows = getSelectedRows();
  if (!rows.length) return;
  const cols = getColumns(currentTab);
  const lines = [cols.join('\t')];
  rows.forEach(r => lines.push(cols.map(c => String(r[c]??'').replace(/\t/g,' ')).join('\t')));
  const blob = new Blob([lines.join('\n')], { type: 'text/tab-separated-values' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tags_${currentTab}_${Date.now()}.tsv`;
  a.click();
}

// ── Push to Google Sheet ──────────────────────────────────────────────────────
async function pushToSheet() {
  const sheetId = document.getElementById('sheetId').value.trim();
  if (!sheetId) {
    setStatus('Enter your Google Sheet ID in the config above', 'err');
    return;
  }

  const rows = getSelectedRows();
  if (!rows.length) { setStatus('No rows selected', 'err'); return; }

  const btn = document.getElementById('pushBtn');
  btn.disabled = true;
  btn.textContent = 'Authenticating…';
  setStatus('Opening Google sign-in…');

  try {
    const token = await getGoogleToken();
    btn.textContent = 'Pushing…';

    const cols   = getColumns(currentTab);
    const tabMap = { sfx: 'SFX', music: 'Music', ui: 'UI Sounds' };
    const tab    = tabMap[currentTab];
    const values = rows.map(r => cols.map(c => String(r[c] ?? '')));

    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(tab)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
      {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values }),
      }
    );

    if (!res.ok) {
      const e = await res.json();
      throw new Error(e.error?.message || `Sheets API ${res.status}`);
    }

    const data = await res.json();
    const written = data.updates?.updatedRows ?? rows.length;
    setStatus(`✓ ${written} rows pushed to "${tab}" tab`, 'ok');
    btn.textContent = `✓ ${written} rows pushed`;
    btn.classList.add('success');

    // Uncheck pushed rows
    document.querySelectorAll('#tableBody input[type=checkbox]:checked').forEach(cb => {
      cb.checked = false;
      cb.closest('tr')?.classList.remove('selected');
    });
    updatePushBar();

  } catch(e) {
    setStatus('Push failed: ' + e.message, 'err');
    btn.textContent = 'Push to Google Sheet';
  }
  btn.disabled = false;
}

// ── Google OAuth (implicit flow — no backend needed) ──────────────────────────
const GOOGLE_CLIENT_ID = ''; // set below after loading

let googleTokenCache = null;
let tokenExpiry      = 0;

async function getGoogleToken() {
  if (googleTokenCache && Date.now() < tokenExpiry) return googleTokenCache;

  return new Promise((resolve, reject) => {
    // Load the Google Identity Services library
    if (!document.getElementById('gsi-script')) {
      const s = document.createElement('script');
      s.id  = 'gsi-script';
      s.src = 'https://accounts.google.com/gsi/client';
      s.onload = () => requestToken(resolve, reject);
      document.head.appendChild(s);
    } else {
      requestToken(resolve, reject);
    }
  });
}

function requestToken(resolve, reject) {
  // We use tokenClient (implicit) — user sees a popup, grants access, token returned
  // CLIENT_ID must be configured in Google Cloud Console with this page's origin
  const clientId = document.getElementById('googleClientId')?.value?.trim() || '';
  if (!clientId) {
    reject(new Error(
      'Google Client ID not set.\n\n' +
      'To set up Google Sheets writing:\n' +
      '1. Go to console.cloud.google.com\n' +
      '2. Create OAuth 2.0 Client ID (Web application)\n' +
      '3. Add your site URL to Authorized JavaScript origins\n' +
      '4. Paste the Client ID into the field that appeared below'
    ));
    return;
  }

  const client = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    callback: (resp) => {
      if (resp.error) { reject(new Error(resp.error)); return; }
      googleTokenCache = resp.access_token;
      tokenExpiry = Date.now() + (resp.expires_in * 1000) - 60000;
      resolve(resp.access_token);
    },
  });
  client.requestAccessToken();
}
